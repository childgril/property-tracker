<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>權狀管理系統</title>
<style>
:root{
  --bg:#f5f3ee; --panel:#fffdf8; --panel-2:#ebe7dc;
  --ink:#1c1c1c; --ink-soft:#5a5a55; --muted:#8a8780;
  --line:#d9d4c5; --line-soft:#e8e4d6;
  --accent:#7a5230; --accent-soft:#a3754d;
  --green:#3b6b3b; --red:#a13a2c; --blue:#2c5f8d; --yellow:#b89427;
  --shadow:0 1px 2px rgba(50,40,20,.06), 0 2px 8px rgba(50,40,20,.04);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);font-family:"Noto Serif TC","Source Han Serif TC","PingFang TC",serif;font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
button{cursor:pointer}
input[type=number]{font-variant-numeric:tabular-nums}

.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--panel);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.brand{padding:18px 18px 12px;border-bottom:1px solid var(--line)}
.brand-title{font-size:17px;font-weight:700;letter-spacing:.08em;color:var(--accent)}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.2em}
.nav{padding:10px 0;flex:1;overflow-y:auto}
.nav-label{padding:8px 18px 4px;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 18px;color:var(--ink-soft);cursor:pointer;border-left:3px solid transparent;font-size:13.5px}
.nav-item:hover{background:var(--panel-2);color:var(--ink)}
.nav-item.active{background:var(--panel-2);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.nav-icon{width:14px;text-align:center;opacity:.7}
.sidebar-foot{padding:10px 14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}
.sidebar-foot .mode-tag{display:inline-block;padding:2px 6px;border-radius:3px;background:var(--panel-2);font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.sidebar-foot button{display:block;width:100%;margin-top:4px;padding:5px 8px;background:transparent;border:1px solid var(--line);border-radius:3px;color:var(--ink-soft);font-size:12px}
.sidebar-foot button:hover{background:var(--panel-2)}

.main{flex:1;padding:22px 30px 60px;max-width:calc(100vw - 230px);overflow-x:hidden}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:700;letter-spacing:.05em}
.page-desc{font-size:12px;color:var(--muted);margin-top:3px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}

.btn{padding:7px 14px;background:var(--panel);border:1px solid var(--line);border-radius:3px;color:var(--ink);font-size:13px;transition:all .15s}
.btn:hover{background:var(--panel-2);border-color:var(--ink-soft)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-soft);border-color:var(--accent-soft)}
.btn-danger{color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:#fbe9e6}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink-soft)}
.btn-ghost:hover{background:var(--panel-2)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px dashed var(--line);gap:8px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:700;letter-spacing:.05em;color:var(--accent)}

.table-wrap{overflow-x:auto;margin:0 -16px}
.table-wrap table{margin:0 16px;width:calc(100% - 32px)}
table{width:100%;border-collapse:collapse;font-size:13px}
table th{text-align:left;padding:8px 10px;background:var(--panel-2);border-bottom:1px solid var(--line);font-weight:600;font-size:12px;letter-spacing:.05em;color:var(--ink-soft);white-space:nowrap}
table td{padding:8px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
table tr:hover td{background:rgba(122,82,48,.04)}
.empty{padding:30px;text-align:center;color:var(--muted);font-style:italic}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:12px 14px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
.stat-value{font-size:22px;font-weight:700;color:var(--ink);margin-top:4px;font-variant-numeric:tabular-nums}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 16px}
.form-grid.col-3{grid-template-columns:repeat(3,1fr)}
.form-grid.col-1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field-label{font-size:12px;color:var(--ink-soft);font-weight:600;letter-spacing:.05em}
.field-label .req{color:var(--red);margin-left:2px}
.field-hint{font-size:11px;color:var(--muted);font-style:italic}
input,select,textarea{width:100%;padding:7px 9px;background:#fff;border:1px solid var(--line);border-radius:3px;outline:none;transition:border-color .15s;color:var(--ink)}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px;font-family:inherit}
input[readonly],input:disabled{background:var(--panel-2);color:var(--ink-soft)}
.section-sub{font-size:13px;font-weight:700;color:var(--accent);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px dashed var(--line);letter-spacing:.05em}

.modal-bg{position:fixed;inset:0;background:rgba(28,28,28,.55);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:30px 16px;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:5px;width:100%;max-width:820px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.modal-sm{max-width:520px}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:var(--panel-2)}
.modal-title{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:.05em}
.modal-close{background:none;border:none;font-size:22px;color:var(--ink-soft);line-height:1;padding:0 4px}
.modal-body{padding:18px;max-height:75vh;overflow-y:auto}
.modal-foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:var(--panel-2)}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:14px;overflow-x:auto}
.tab{padding:8px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--ink-soft);font-size:13px;white-space:nowrap;letter-spacing:.05em;cursor:pointer}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:.05em;white-space:nowrap}
.badge-land{background:#e6efde;color:#3b6b3b}
.badge-building{background:#e3edf6;color:#2c5f8d}
.badge-self{background:#f0e6da;color:#7a5230}
.badge-rented{background:#fdf1d8;color:#8a6f1a}
.badge-sold{background:#eee;color:#666}
.badge-active{background:#dceadc;color:#3b6b3b}

.detail-header{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
.detail-title{font-size:24px;font-weight:700;letter-spacing:.05em;color:var(--accent)}
.detail-meta{font-size:12px;color:var(--muted);margin-top:4px}
.kv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px 18px;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
.kv-item{display:flex;flex-direction:column;gap:2px}
.kv-label{font-size:11px;color:var(--muted);letter-spacing:.1em}
.kv-value{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}

.num{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.text-muted{color:var(--muted)}
.text-red{color:var(--red)}
.text-green{color:var(--green)}
.text-center{text-align:center}
.row-actions{white-space:nowrap;text-align:right}
.row-actions button{margin-left:4px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 18px;background:var(--ink);color:#fff;border-radius:4px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:200;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}

.viewer-banner{background:#fdf1d8;border:1px solid #e8c879;padding:8px 14px;font-size:12px;color:#8a6f1a;text-align:center;border-radius:3px;margin-bottom:14px}
.linked-pair{background:var(--panel-2);padding:8px 12px;border-radius:3px;font-size:12px;color:var(--ink-soft);margin-top:8px}
.linked-pair strong{color:var(--accent)}

@media (max-width: 768px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--line)}
  .main{max-width:100%;padding:16px}
  .form-grid,.form-grid.col-3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title">權狀管理</div>
      <div class="brand-sub">PROPERTY TRACKER</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <div><span class="mode-tag" id="modeTag">擁有者</span></div>
      <div id="syncStatus">未連線雲端</div>
      <button onclick="cloudSync()">☁ 同步雲端</button>
      <button onclick="cloudLoad()">⬇ 雲端載入</button>
      <button onclick="openSettings()">⚙ 設定</button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   權狀管理系統 - 主程式
   資料儲存: localStorage + GitHub Gist 同步
   ============================================================ */

// -------- 常數 --------
const STORAGE_KEY = 'property_tracker_v1';
const CONFIG_KEY = 'property_tracker_cfg_v1';
const TYPE_LAND = 'land';
const TYPE_BUILDING = 'building';

// -------- 全域狀態 --------
let DB = loadDB();
let CFG = loadCfg();
let currentPage = 'dashboard';
let currentDetailId = null;

// -------- 工具函式 --------
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function fmt(n, dp=0){ if(n===null||n===undefined||n==='')return '—'; const x=Number(n); if(isNaN(x))return '—'; return x.toLocaleString('zh-TW',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function money(n){ return n===null||n===undefined||n===''?'—':'$'+fmt(n); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function yearOf(iso){ return iso?Number(iso.slice(0,4)):null; }

function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { properties:[], updatedAt:null };
}
function saveDB(){
  DB.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
}
function loadCfg(){
  try{
    const raw = localStorage.getItem(CONFIG_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { mode:'owner', token:'', gistId:'' };
}
function saveCfg(){ localStorage.setItem(CONFIG_KEY, JSON.stringify(CFG)); }

function toast(msg, kind=''){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind||'');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.className='toast '+(kind||''), 2400);
}

function isOwner(){ return CFG.mode === 'owner'; }
function isViewer(){ return CFG.mode === 'viewer'; }
function requireOwner(){
  if(!isOwner()){ toast('觀看者模式無法編輯','error'); return false; }
  return true;
}

// -------- 持分計算 --------
// 持分以 numerator/denominator 表示 (例如 1/2)
function shareToDecimal(s){
  if(!s) return 1;
  if(typeof s === 'number') return s;
  if(s.num!=null && s.den) return Number(s.num)/Number(s.den);
  return 1;
}
function shareText(s){
  if(!s || s.den==null || s.num==null) return '全部';
  return `${s.num}/${s.den}`;
}

// -------- 計算總和 --------
function totalPurchase(p){
  let sum = 0;
  (p.transactions||[]).forEach(t=>{
    if(t.type==='buy' || t.type==='transfer-in' || t.type==='gift-in'){
      sum += Number(t.price||0) + sumFees(t);
    }
  });
  return sum;
}
function sumFees(t){
  const f = t.fees || {};
  return Number(f.agent||0)+Number(f.transfer||0)+Number(f.handling||0)+Number(f.bankLoan||0)+Number(f.other||0);
}
function totalTax(p){
  return (p.taxes||[]).reduce((s,t)=>s+Number(t.amount||0),0);
}
function totalRent(p){
  let sum = 0;
  (p.rentals||[]).forEach(r=>{
    (r.payments||[]).forEach(pm=>{ sum += Number(pm.amount||0); });
  });
  return sum;
}
function currentOwners(p){
  // 回傳目前所有權人陣列 [{name, share}]
  // 優先順序:
  //  1) 最新一筆交易的 newOwners (因為 tx 同時定義「變更後狀態」)
  //  2) 舊資料的 ownerHistory(取最新日期那組)
  //  3) p.owner 欄位
  const txs = [...(p.transactions||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const latestTxWithOwners = txs.find(t=>(t.newOwners||[]).some(o=>o.name));
  if(latestTxWithOwners){
    return (latestTxWithOwners.newOwners||[]).filter(o=>o.name).map(o=>({name:o.name, share:o.share}));
  }
  // 退回到 ownerHistory(舊資料相容)
  const hist = (p.ownerHistory||[]).filter(h=>!h.auto); // 非自動產生的舊資料
  if(hist.length){
    const sorted = [...hist].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const latestDate = sorted[0].date;
    return sorted.filter(h=>h.date===latestDate).map(o=>({name:o.name, share:o.share}));
  }
  if(p.owner) return [{name:p.owner, share:null}];
  return [];
}
function currentOwner(p){
  // 含持分文字的單一字串
  const list = currentOwners(p);
  if(!list.length) return '—';
  return list.map(o=>`${o.name}${o.share?'('+shareText(o.share)+')':''}`).join('、');
}
function currentOwnerNames(p){
  const list = currentOwners(p);
  if(!list.length) return '—';
  return list.map(o=>o.name).join('、');
}
function currentShareText(p){
  const list = currentOwners(p);
  if(!list.length) return '—';
  // 若所有人都沒寫持分,顯示「全部」
  const hasShare = list.some(o=>o.share);
  if(!hasShare) return '全部';
  return list.map(o=>shareText(o.share)).join('、');
}
function activeRental(p){
  const today = todayISO();
  return (p.rentals||[]).find(r=>{
    const start = r.startDate||'';
    const end = r.endDate||'';
    return start<=today && (!end || end>=today);
  });
}

// -------- 路由 --------
const PAGES = [
  { id:'dashboard', label:'總覽', icon:'◈', group:'總覽' },
  { id:'properties', label:'權狀清單', icon:'❒', group:'資產' },
  { id:'paired', label:'土地建物配對', icon:'⛯', group:'資產' },
  { id:'transactions', label:'買賣紀錄', icon:'⇄', group:'紀錄' },
  { id:'taxes', label:'稅金紀錄', icon:'¥', group:'紀錄' },
  { id:'rentals', label:'出租紀錄', icon:'⌂', group:'紀錄' },
  { id:'report', label:'報表分析', icon:'∑', group:'分析' }
];

function renderNav(){
  const nav = document.getElementById('nav');
  const groups = {};
  PAGES.forEach(p=>{ (groups[p.group]=groups[p.group]||[]).push(p); });
  let html = '';
  Object.keys(groups).forEach(g=>{
    html += `<div class="nav-label">${g}</div>`;
    groups[g].forEach(p=>{
      html += `<div class="nav-item ${currentPage===p.id?'active':''}" onclick="go('${p.id}')">
        <span class="nav-icon">${p.icon}</span>${p.label}</div>`;
    });
  });
  nav.innerHTML = html;
  document.getElementById('modeTag').textContent = isOwner()?'擁有者':'觀看者';
  const sync = document.getElementById('syncStatus');
  if(CFG.gistId){
    sync.textContent = '雲端:' + CFG.gistId.slice(0,8) + '…';
  } else {
    sync.textContent = '未連線雲端';
  }
}

function go(page, opts){
  currentPage = page;
  if(opts && opts.id) currentDetailId = opts.id;
  renderNav();
  render();
  window.scrollTo(0,0);
}

function render(){
  const main = document.getElementById('main');
  if(currentPage === 'detail') return renderDetail(main);
  switch(currentPage){
    case 'dashboard': return renderDashboard(main);
    case 'properties': return renderProperties(main);
    case 'paired': return renderPaired(main);
    case 'transactions': return renderTransactions(main);
    case 'taxes': return renderTaxes(main);
    case 'rentals': return renderRentals(main);
    case 'report': return renderReport(main);
  }
}


/* ============================================================
   頁面渲染
   ============================================================ */

// -------- 總覽 --------
function renderDashboard(main){
  const props = DB.properties||[];
  const lands = props.filter(p=>p.type===TYPE_LAND);
  const buildings = props.filter(p=>p.type===TYPE_BUILDING);
  const totalCost = props.reduce((s,p)=>s+totalPurchase(p),0);
  const totalTaxAll = props.reduce((s,p)=>s+totalTax(p),0);
  const totalRentAll = props.reduce((s,p)=>s+totalRent(p),0);
  const rented = props.filter(p=>activeRental(p)).length;

  main.innerHTML = `
    ${isViewer()?'<div class="viewer-banner">👀 目前為觀看者模式 - 唯讀</div>':''}
    <div class="page-head">
      <div>
        <div class="page-title">總覽</div>
        <div class="page-desc">資產狀況一覽</div>
      </div>
      <div class="page-actions">
        ${isOwner()?'<button class="btn btn-primary" onclick="openPropertyForm()">＋ 新增權狀</button>':''}
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">權狀總數</div><div class="stat-value">${props.length}</div>
        <div class="stat-sub">土地 ${lands.length} / 建物 ${buildings.length}</div></div>
      <div class="stat"><div class="stat-label">累計購置成本</div><div class="stat-value">${money(totalCost)}</div>
        <div class="stat-sub">含手續費</div></div>
      <div class="stat"><div class="stat-label">累計稅金</div><div class="stat-value">${money(totalTaxAll)}</div>
        <div class="stat-sub">房屋稅+地價稅+其他</div></div>
      <div class="stat"><div class="stat-label">累計租金收入</div><div class="stat-value">${money(totalRentAll)}</div>
        <div class="stat-sub">已收</div></div>
      <div class="stat"><div class="stat-label">目前出租中</div><div class="stat-value">${rented}</div>
        <div class="stat-sub">${rented?'處':'—'}</div></div>
      <div class="stat"><div class="stat-label">淨投入</div><div class="stat-value ${totalCost+totalTaxAll-totalRentAll>=0?'':'text-green'}">${money(totalCost+totalTaxAll-totalRentAll)}</div>
        <div class="stat-sub">成本+稅 − 租金</div></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">權狀清單</div>
        <div class="page-actions">${isOwner()?'<button class="btn btn-sm" onclick="openPropertyForm()">＋ 新增</button>':''}</div>
      </div>
      ${renderPropertyTable(props)}
    </div>
  `;
}

function renderPropertyTable(props){
  if(!props.length) return '<div class="empty">尚無權狀資料,點上方「新增權狀」開始</div>';
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>類型</th><th>名稱 / 地址</th><th>地段地號 / 建號</th>
      <th class="num">面積</th><th>目前所有權人</th><th>持分</th>
      <th class="num">購置成本</th><th class="num">累計稅金</th>
      <th>狀態</th><th></th>
    </tr></thead>

// -------- 配對顯示 --------
function renderPaired(main){
  const props = DB.properties||[];
  // 配對:有 linkedTo 的會把土地+建物一起顯示
  const groups = [];
  const used = new Set();
  props.forEach(p=>{
    if(used.has(p.id)) return;
    const linked = (p.linkedTo||[]).map(id=>props.find(x=>x.id===id)).filter(Boolean);
    if(linked.length){
      const all = [p, ...linked.filter(l=>!used.has(l.id))];
      all.forEach(x=>used.add(x.id));
      groups.push(all);
    }
  });
  // 沒配對的單獨一組
  props.forEach(p=>{ if(!used.has(p.id)) groups.push([p]); });

  main.innerHTML = `
    ${isViewer()?'<div class="viewer-banner">👀 觀看者模式</div>':''}
    <div class="page-head">
      <div>
        <div class="page-title">土地建物配對</div>
        <div class="page-desc">同一不動產的土地與建物權狀合併顯示</div>
      </div>
    </div>
    ${groups.length?groups.map(renderGroup).join(''):'<div class="empty">尚無資料</div>'}
  `;
}

function renderReport(main){
  const props = DB.properties||[];
  // 各權狀的損益

    const cost = totalPurchase(p);
    const tax = totalTax(p);
    const rent = totalRent(p);
    const sold = (p.transactions||[]).filter(t=>t.type==='sell'||t.type==='gift-out'||t.type==='transfer-out')
      .reduce((s,t)=>s+Number(t.price||0),0);
    return { p, cost, tax, rent, sold, net: rent+sold-cost-tax };
  });
  const totalCost = rows.reduce((s,r)=>s+r.cost,0);
  const totalTaxAll = rows.reduce((s,r)=>s+r.tax,0);
  const totalRentAll = rows.reduce((s,r)=>s+r.rent,0);

  main.innerHTML = `

function renderOwnerHistory(p){
  // 把同一筆 tx 的多位共有人聚合在同一列顯示
  const hist = [...(p.ownerHistory||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!hist.length) return '<div class="empty">尚無紀錄</div>';
  // 以 txId 為主,沒 txId 的視為獨立(舊資料)
  const groups = {};
  const order = [];
  hist.forEach(h=>{
    const key = h.txId || h.id;
    if(!groups[key]){ groups[key] = []; order.push(key); }
    groups[key].push(h);
  });
  return `<div class="table-wrap"><table>
    <thead><tr><th>日期</th><th>所有權人(持分)</th><th>方式</th><th>備註</th><th></th></tr></thead>
    <tbody>${order.map(key=>{
      const rows = groups[key];
      const first = rows[0];
      const isAuto = first.auto;
      const txId = first.txId;

function showModal(html, opts){

    <div class="modal ${opts&&opts.small?'modal-sm':''}">${html}</div></div>`;
}

  `);
}

function saveProperty(id){
  const name = getVal('f_name').trim();
  if(!name){ toast('請填名稱','error'); return; }
  const linkedChecks = document.querySelectorAll('input[name=link]:checked');
  const linkedTo = Array.from(linkedChecks).map(c=>c.value);

  let p;
  if(id){
    p = (DB.properties||[]).find(x=>x.id===id);
  } else {
    p = { id:uid(), transactions:[], taxes:[], rentals:[], ownerHistory:[], linkedTo:[] };
    DB.properties.push(p);
  }
  // 取得舊的關聯,要做雙向更新
  const oldLinked = new Set(p.linkedTo||[]);
  const newLinked = new Set(linkedTo);

  p.type = getVal('f_type');
  p.name = name;
  p.address = getVal('f_address');
  p.parcelId = getVal('f_parcel');
  p.zoning = getVal('f_zoning');
  p.area = getNum('f_area');
  p.areaUnit = getVal('f_areaUnit');
  p.acquireDate = getVal('f_acquire');
  p.owner = getVal('f_owner');
  p.notes = getVal('f_notes');
  p.linkedTo = linkedTo;

  // 雙向同步:在對方的 linkedTo 加上或移除自己
  (DB.properties||[]).forEach(other=>{
    if(other.id===p.id) return;
    other.linkedTo = other.linkedTo||[];
    if(newLinked.has(other.id) && !other.linkedTo.includes(p.id)){
      other.linkedTo.push(p.id);
    } else if(!newLinked.has(other.id) && other.linkedTo.includes(p.id) && oldLinked.has(other.id)){
      other.linkedTo = other.linkedTo.filter(x=>x!==p.id);
    }
  });

  saveDB();
  closeModal();
  toast('已儲存','success');
  render();
}

function deleteProperty(id){
  if(!requireOwner()) return;
  if(!confirm('確定刪除此權狀?(包含所有相關紀錄)')) return;
  DB.properties = DB.properties.filter(x=>x.id!==id);
  // 清理其他權狀的 linkedTo
  DB.properties.forEach(p=>{
    if(p.linkedTo) p.linkedTo = p.linkedTo.filter(x=>x!==id);
  });
  saveDB();
  go('properties');
  toast('已刪除');
}

function saveOwner(propId, ownerId){
  const p = (DB.properties||[]).find(x=>x.id===propId);
  if(!p) return;
  const name = getVal('o_name').trim();
  if(!name){ toast('請填姓名','error'); return; }
  const num = getVal('o_num'), den = getVal('o_den');
  const share = (num&&den)?{num:Number(num),den:Number(den)}:null;
  const rec = {
    id: ownerId||uid(),
    date: getVal('o_date'),
    name,
    method: getVal('o_method'),
    share,
    notes: getVal('o_notes')
  };
  p.ownerHistory = p.ownerHistory||[];
  if(ownerId){
    const idx = p.ownerHistory.findIndex(x=>x.id===ownerId);
    if(idx>=0) p.ownerHistory[idx] = rec;
  } else {
    p.ownerHistory.push(rec);
  }
  saveDB();
  closeModal();
  toast('已儲存','success');
  render();
}

function deleteOwner(propId, ownerId){
  if(!requireOwner()) return;
  if(!confirm('確定刪除這筆變更紀錄?')) return;
  const p = (DB.properties||[]).find(x=>x.id===propId);
  if(!p) return;
  p.ownerHistory = (p.ownerHistory||[]).filter(x=>x.id!==ownerId);
  saveDB();
  render();
}

  `);

  window._txNewOwners = newOwners.map(o=>({...o}));

function renderOwnerRows(){
  const list = window._txNewOwners||[];
  const html = list.map((o,i)=>`
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <input value="${esc(o.name||'')}" placeholder="姓名" style="flex:2" oninput="window._txNewOwners[${i}].name=this.value">
      <input type="number" value="${o.num||''}" placeholder="分子" style="flex:1" oninput="window._txNewOwners[${i}].num=this.value">
      <span>/</span>
      <input type="number" value="${o.den||''}" placeholder="分母" style="flex:1" oninput="window._txNewOwners[${i}].den=this.value">
      <button class="btn btn-sm btn-ghost text-red" onclick="removeOwnerRow(${i})" ${list.length===1?'disabled':''}>×</button>
    </div>`).join('');
  document.getElementById('ownersList').innerHTML = html;
}
function addOwnerRow(){
  window._txNewOwners.push({name:'',num:'',den:''});
  renderOwnerRows();
}
function removeOwnerRow(i){
  window._txNewOwners.splice(i,1);
  if(window._txNewOwners.length===0) window._txNewOwners.push({name:'',num:'',den:''});
  renderOwnerRows();
}

function saveTx(propId, txId){
  const p = (DB.properties||[]).find(x=>x.id===propId);
  if(!p) return;
  const num = getVal('t_num'), den = getVal('t_den');
  const share = (num&&den)?{num:Number(num),den:Number(den)}:null;
  // 收集變更後所有權人
  const newOwners = (window._txNewOwners||[]).filter(o=>(o.name||'').trim()).map(o=>({
    name: o.name.trim(),
    share: (o.num&&o.den)?{num:Number(o.num),den:Number(o.den)}:null
  }));
  const rec = {
    id: txId||uid(),
    type: getVal('t_type'),
    date: getVal('t_date'),
    counterparty: getVal('t_party'),
    share,
    newOwners,
    price: getNum('t_price'),
    fees: {
      agent: getNum('t_agent'),
      transfer: getNum('t_transfer'),
      handling: getNum('t_handling'),
      bankLoan: getNum('t_loan'),
      other: getNum('t_other')
    },
    loanInfo: getVal('t_loanInfo'),
    notes: getVal('t_notes')
  };
  p.transactions = p.transactions||[];
  if(txId){
    const idx = p.transactions.findIndex(x=>x.id===txId);
    if(idx>=0) p.transactions[idx] = rec;
  } else {
    p.transactions.push(rec);
  }
  // 同步更新 ownerHistory:每位 newOwner 對應一筆 ownerHistory,以 txId+index 作關聯
  syncOwnerHistoryFromTx(p, rec);
  saveDB();
  closeModal();
  toast('已儲存','success');
  // 編輯後若有 txId 維持當前頁,新增則回到 detail
  render();
}

// 從一筆 transaction 同步建立/更新 ownerHistory
function syncOwnerHistoryFromTx(p, t){
  p.ownerHistory = p.ownerHistory||[];
  // 先移除這筆 tx 對應的舊紀錄
  p.ownerHistory = p.ownerHistory.filter(h=>h.txId!==t.id);
  // 依新的 newOwners 重新加入
  (t.newOwners||[]).forEach((o,i)=>{
    p.ownerHistory.push({
      id: t.id+'_'+i,
      txId: t.id,
      date: t.date,
      name: o.name,
      share: o.share,
      method: txTypeLabel(t.type),
      notes: t.counterparty?`對象:${t.counterparty}`:'',
      auto: true  // 標記為從交易自動產生
    });
  });
}

function deleteTx(propId, txId){
  if(!requireOwner()) return;
  if(!confirm('確定刪除這筆紀錄?(對應的所有權人變更也會被清除)')) return;
  const p = (DB.properties||[]).find(x=>x.id===propId);
  p.transactions = (p.transactions||[]).filter(x=>x.id!==txId);
  p.ownerHistory = (p.ownerHistory||[]).filter(h=>h.txId!==txId);
  saveDB(); render();
}

function importJSON(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(!data.properties){ toast('檔案格式錯誤','error'); return; }
      if(!confirm('匯入會覆蓋目前本機資料,確定?')) return;
      DB = data;
      saveDB();
      render();
      toast('匯入成功','success');
    }catch(err){ toast('解析失敗:'+err.message,'error'); }
  };
  reader.readAsText(file);
}

// -------- GitHub Gist 同步 --------
async function cloudSync(){
  if(!isOwner()){ toast('觀看者模式無法上傳','error'); return; }
  if(!CFG.token){ toast('請先到「設定」填入 GitHub Token','error'); openSettings(); return; }
  try{
    toast('同步中...');
    const payload = {
      description: 'Property Tracker Data (sync at ' + new Date().toISOString() + ')',
      files: { 'property-tracker.json': { content: JSON.stringify(DB, null, 2) } }
    };
    let res, data;
    if(CFG.gistId){
      // 更新
      res = await fetch('https://api.github.com/gists/' + CFG.gistId, {
        method:'PATCH',
        headers:{ 'Authorization':'token '+CFG.token, 'Content-Type':'application/json', 'Accept':'application/vnd.github+json' },
        body: JSON.stringify(payload)
      });
    } else {
      // 建立
      payload.public = false;  // 預設私人,要分享時擁有者再去 GitHub 改為公開
      res = await fetch('https://api.github.com/gists', {
        method:'POST',
        headers:{ 'Authorization':'token '+CFG.token, 'Content-Type':'application/json', 'Accept':'application/vnd.github+json' },
        body: JSON.stringify(payload)
      });
    }
    if(!res.ok){
      const err = await res.text();
      toast('同步失敗: '+res.status,'error');
      console.error(err);
      return;
    }
    data = await res.json();
    if(!CFG.gistId){
      CFG.gistId = data.id;
      saveCfg();
      renderNav();
      toast('已建立 Gist,記得到 GitHub 把它設為公開後再分享 ID','success');
    } else {
      toast('已同步到雲端','success');
    }
  }catch(err){
    toast('同步失敗:'+err.message,'error');
    console.error(err);
  }
}

async function cloudLoad(){
  if(!CFG.gistId){ toast('請先在「設定」填入 Gist ID','error'); openSettings(); return; }
  try{
    toast('載入中...');
    const headers = { 'Accept':'application/vnd.github+json' };
    if(CFG.token) headers['Authorization'] = 'token '+CFG.token;
    const res = await fetch('https://api.github.com/gists/' + CFG.gistId, { headers });
    if(!res.ok){
      toast('載入失敗:'+res.status+' '+(res.status===404?'(Gist 不存在或未公開)':''),'error');
      return;
    }
    const data = await res.json();
    const file = data.files && data.files['property-tracker.json'];
    if(!file){ toast('找不到資料檔案','error'); return; }
    let content = file.content;
    // 若被截斷,從 raw_url 抓
    if(file.truncated && file.raw_url){
      const r = await fetch(file.raw_url);
      content = await r.text();
    }
    const parsed = JSON.parse(content);
    if(!parsed.properties){ toast('資料格式錯誤','error'); return; }
    // 觀看者:直接覆蓋; 擁有者:詢問
    if(isOwner()){
      if(!confirm('雲端載入會覆蓋本機資料,確定?')) return;
    }
    DB = parsed;
    saveDB();
    render();
    toast('已從雲端載入','success');
  }catch(err){
    toast('載入失敗:'+err.message,'error');
    console.error(err);
  }
}

  if(isViewer() && CFG.gistId){

function parseURLParams(){
  const params = new URLSearchParams(window.location.search);
  const gist = params.get('gist');
  const mode = params.get('mode');
  let changed = false;
  if(gist && gist!==CFG.gistId){ CFG.gistId = gist; changed = true; }
  if(mode==='viewer' && CFG.mode!=='viewer'){ CFG.mode = 'viewer'; changed = true; }
  if(changed) saveCfg();
}

// -------- 啟動 --------
parseURLParams();
renderNav();
render();
autoLoadIfViewer();

</script>
</body>
